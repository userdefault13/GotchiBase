default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://postgres:password@localhost:5433/gotchi_forge_development") %>

test:
  <<: *default
  url: <%= (ENV["DATABASE_URL"] || "postgres://postgres:password@localhost:5433/gotchi_forge_development").sub(/\/[^\/]+$/, "/gotchi_forge_test") %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
